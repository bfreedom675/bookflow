<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Книжковий застосунок v3</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    display: flex;
    height: 100vh;
}

/* ЛІВА ПАНЕЛЬ */
#sidebar {
    width: 30%;
    background: #111;
    color: white;
    padding: 10px;
    overflow-y: auto;
}

.book {
    padding: 10px;
    margin: 5px 0;
    background: #222;
    cursor: pointer;
    border-radius: 6px;
}

.book:hover {
    background: #333;
}

/* ПРАВА ПАНЕЛЬ */
#main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #f4f4f4;
}

header {
    padding: 15px;
    background: #000;
    color: white;
    font-size: 18px;
}

#chat {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.msg {
    padding: 10px;
    border-radius: 10px;
    max-width: 70%;
    white-space: pre-wrap;
}

.user {
    align-self: flex-end;
    background: #cfe8ff;
}

.bot {
    align-self: flex-start;
    background: #e6e6e6;
}

/* ВВІД */
#inputArea {
    display: flex;
    gap: 8px;
    padding: 10px;
    background: white;
    border-top: 1px solid #ccc;
}

input {
    padding: 8px;
}

#text {
    flex: 1;
}

button {
    padding: 8px 12px;
    border: none;
    background: black;
    color: white;
    cursor: pointer;
}

.small {
    width: 70px;
}
</style>
</head>

<body>

<div id="sidebar">
    <h3>📚 Мої книги</h3>
    <input id="newBook" placeholder="Нова книга..." />
    <button onclick="addBook()">➕</button>
    <div id="bookList"></div>
</div>

<div id="main">
    <header id="title">📖 Обери книгу</header>

    <div id="chat"></div>

    <div id="inputArea">
        <input id="text" placeholder="Нотатка..." />
        <input id="rating" class="small" type="number" min="1" max="10" placeholder="⭐">
        <button onclick="addNote()">Надіслати</button>
    </div>
</div>

<script>
let books = JSON.parse(localStorage.getItem("booksV3")) || {};
let current = null;

function save() {
    localStorage.setItem("booksV3", JSON.stringify(books));
}

function renderBooks() {
    let list = document.getElementById("bookList");
    list.innerHTML = "";

    Object.keys(books).forEach(name => {
        let div = document.createElement("div");
        div.className = "book";
        div.innerText = name;
        div.onclick = () => openBook(name);
        list.appendChild(div);
    });
}

function addBook() {
    let name = document.getElementById("newBook").value.trim();
    if (!name) return;

    if (!books[name]) {
        books[name] = [];
    }

    document.getElementById("newBook").value = "";
    save();
    renderBooks();
}

function openBook(name) {
    current = name;
    document.getElementById("title").innerText = "📖 " + name;
    renderChat();
}

function renderChat() {
    let chat = document.getElementById("chat");
    chat.innerHTML = "";

    if (!current) return;

    books[current].forEach(m => {
        let div = document.createElement("div");
        div.className = "msg " + (m.type === "user" ? "user" : "bot");
        div.innerText = m.text;
        chat.appendChild(div);
    });

    chat.scrollTop = chat.scrollHeight;
}

function addNote() {
    if (!current) return;

    let text = document.getElementById("text").value.trim();
    let rating = document.getElementById("rating").value;

    if (!text) return;

    let fullText =
        "📌 " + text +
        (rating ? "\n⭐ " + rating + "/10" : "");

    books[current].push({ type: "user", text: fullText });

    books[current].push({
        type: "bot",
        text: "💾 Збережено у книзі: " + current
    });

    document.getElementById("text").value = "";
    document.getElementById("rating").value = "";

    save();
    renderChat();
}

renderBooks();
</script>

</body>
</html>
