<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Мій книжковий чат-блог</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}

header {
    background: #111;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

#chat {
    height: 80vh;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.message {
    max-width: 70%;
    padding: 10px 15px;
    border-radius: 12px;
    line-height: 1.4;
}

.user {
    align-self: flex-end;
    background: #d1e7ff;
}

.bot {
    align-self: flex-start;
    background: #e8e8e8;
}

#inputArea {
    display: flex;
    padding: 10px;
    background: white;
    position: fixed;
    bottom: 0;
    width: 100%;
    box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
}

#textInput {
    flex: 1;
    padding: 10px;
    font-size: 16px;
}

button {
    padding: 10px 15px;
    margin-left: 10px;
    border: none;
    background: black;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<header>📚 Мій книжковий чат-блог</header>

<div id="chat"></div>

<div id="inputArea">
    <input id="textInput" placeholder="Напиши книгу або думку..." />
    <button onclick="sendMessage()">Надіслати</button>
</div>

<script>
function sendMessage() {
    let input = document.getElementById("textInput");
    let text = input.value.trim();

    if (text === "") return;

    let chat = document.getElementById("chat");

    // повідомлення користувача
    let userMsg = document.createElement("div");
    userMsg.className = "message user";
    userMsg.innerText = "📖 " + text;
    chat.appendChild(userMsg);

    // автоматична відповідь (твій "щоденник")
    let botMsg = document.createElement("div");
    botMsg.className = "message bot";
    botMsg.innerText = "💬 Запис збережено у твоєму читацькому щоденнику.";
    chat.appendChild(botMsg);

    input.value = "";
    chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
