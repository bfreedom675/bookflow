<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>BookFlow v5</title>

<style>
:root{
    --pink:#ff5fa2;
    --purple:#7b5cff;
    --bg1:#ffe6f3;
    --bg2:#efe6ff;
    --card:#ffffffcc;
}

body{
    margin:0;
    font-family: Arial, sans-serif;
    height:100vh;
    display:flex;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
}

/* SIDEBAR */
#sidebar{
    width:30%;
    padding:12px;
    background: linear-gradient(180deg, #ffffffaa, #ffffff66);
    backdrop-filter: blur(10px);
    display:flex;
    flex-direction:column;
    gap:10px;
    border-right: 1px solid #fff;
}

h2{
    margin:0;
    color: var(--purple);
}

input, button{
    padding:10px;
    border-radius:10px;
    border:none;
    outline:none;
}

button{
    cursor:pointer;
    background: linear-gradient(90deg, var(--pink), var(--purple));
    color:white;
    font-weight:bold;
}

.book{
    background: var(--card);
    padding:10px;
    border-radius:12px;
    cursor:pointer;
    transition:0.2s;
}

.book:hover{
    transform:scale(1.02);
}

/* MAIN */
#main{
    flex:1;
    display:flex;
    flex-direction:column;
}

header{
    padding:15px;
    font-size:18px;
    font-weight:bold;
    color:var(--purple);
}

/* STATS */
#stats{
    margin:0 15px;
    padding:10px;
    background: var(--card);
    border-radius:12px;
}

/* CHAT */
#chat{
    flex:1;
    padding:15px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.msg{
    max-width:70%;
    padding:10px;
    border-radius:12px;
    white-space:pre-wrap;
    box-shadow:0 5px 10px #00000010;
}

.user{
    align-self:flex-end;
    background: linear-gradient(90deg, var(--pink), var(--purple));
    color:white;
}

.bot{
    align-self:flex-start;
    background:white;
}

/* INPUT */
#inputArea{
    display:flex;
    gap:8px;
    padding:10px;
}

#text{flex:1;}

.small{width:90px;}
</style>
</head>

<body>

<div id="sidebar">
    <h2>🌸 BookFlow v5</h2>

    <input id="search" placeholder="🔍 Пошук..." oninput="renderBooks()" />

    <input id="newBook" placeholder="Нова книга..." />
    <button onclick="addBook()">➕ Додати книгу</button>

    <div id="bookList"></div>
</div>

<div id="main">

<header id="title">📚 Оберіть книгу</header>

<div id="stats">📊 Статистика...</div>

<div id="chat"></div>

<div id="inputArea">
    <input id="text" placeholder="Нотатка..." />
    <input id="rating" class="small" type="number" min="1" max="10" placeholder="⭐">
    <button onclick="addNote()">Надіслати</button>
</div>

</div>

<script>
let db = JSON.parse(localStorage.getItem("bookflow_v5")) || {
    user:"guest",
    books:{}
};

let current=null;

/* SAVE */
function save(){
    localStorage.setItem("bookflow_v5", JSON.stringify(db));
}

/* BOOKS */
function addBook(){
    let name=document.getElementById("newBook").value.trim();
    if(!name)return;

    if(!db.books[name]) db.books[name]=[];

    document.getElementById("newBook").value="";
    save();
    renderBooks();
}

function renderBooks(){
    let list=document.getElementById("bookList");
    let search=document.getElementById("search").value.toLowerCase();

    list.innerHTML="";

    Object.keys(db.books)
    .filter(b=>b.toLowerCase().includes(search))
    .forEach(name=>{
        let div=document.createElement("div");
        div.className="book";
        div.innerText="📖 "+name;
        div.onclick=()=>openBook(name);
        list.appendChild(div);
    });

    updateStats();
}

/* OPEN */
function openBook(name){
    current=name;
    document.getElementById("title").innerText="📖 "+name;
    renderChat();
}

/* CHAT */
function renderChat(){
    let chat=document.getElementById("chat");
    chat.innerHTML="";
    if(!current)return;

    db.books[current].forEach(m=>{
        let div=document.createElement("div");
        div.className="msg "+m.type;
        div.innerText=m.text;
        chat.appendChild(div);
    });

    chat.scrollTop=chat.scrollHeight;
}

/* ADD NOTE */
function addNote(){
    if(!current)return;

    let text=document.getElementById("text").value.trim();
    let rating=document.getElementById("rating").value;

    if(!text)return;

    let msg="📌 "+text+(rating?`\n⭐ ${rating}/10`:"");

    db.books[current].push({type:"user",text:msg});
    db.books[current].push({type:"bot",text:"💾 saved to BookFlow cloud (local demo)"});

    document.getElementById("text").value="";
    document.getElementById("rating").value="";

    save();
    renderChat();
    updateStats();
}

/* STATS */
function updateStats(){
    let books=Object.keys(db.books);
    let sum=0,count=0;

    books.forEach(b=>{
        db.books[b].forEach(m=>{
            let r=m.text.match(/⭐ (\d+)/);
            if(r){sum+=+r[1];count++;}
        });
    });

    let avg=count?(sum/count).toFixed(1):0;

    document.getElementById("stats").innerText=
    `📚 Книг: ${books.length} | ⭐ середня оцінка: ${avg} | 👤 ${db.user}`;
}

renderBooks();
</script>

</body>
</html>
