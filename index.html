<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>BookFlow</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#ffd6e8,#e6d6ff);
    display:flex;
    height:100vh;
}

/* LOGIN */
#login{
    margin:auto;
    background:white;
    padding:25px;
    border-radius:20px;
    width:300px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* APP */
#app{
    display:none;
    width:100%;
}

/* SIDEBAR */
.sidebar{
    width:30%;
    background:white;
    padding:15px;
    overflow:auto;
}

/* MAIN */
.main{
    flex:1;
    padding:20px;
}

/* INPUT */
input{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:10px;
    border:1px solid #ddd;
}

/* BUTTON */
button{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:10px;
    background:#7b5cff;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* BOOK */
.book{
    padding:10px;
    margin:5px 0;
    background:#f3f3f3;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
    transition:0.3s;
}

.book:hover{
    transform:scale(1.02);
}

/* NOTE */
.note{
    background:white;
    padding:10px;
    margin:5px 0;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* DELETE BTN */
.delete{
    background:red;
    padding:5px 8px;
    border-radius:8px;
    font-size:12px;
}

/* SEARCH */
#search{
    margin-bottom:10px;
}
</style>
</head>

<body>

<div id="login">
<h2>🌸 BookFlow</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Sign Up</button>
<button onclick="signin()">Sign In</button>
</div>

<div id="app">
<div class="sidebar">
<h3>📚 Книги</h3>

<input id="search" placeholder="🔍 Пошук..." oninput="filterBooks()">

<input id="bookInput" placeholder="Нова книга">
<button onclick="addBook()">➕ Додати</button>

<div id="bookList"></div>

<button onclick="logout()">🚪 Вийти</button>
</div>

<div class="main">
<h2 id="bookTitle">Вибери книгу</h2>

<input id="noteInput" placeholder="Нотатка">
<button onclick="addNote()">➕ Додати нотатку</button>

<div id="notes"></div>
</div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDG9DT2ImvGLeZRdQ4j5nVttQCU44TFNj8",
  authDomain: "bookflow-17d9f.firebaseapp.com",
  projectId: "bookflow-17d9f",
  storageBucket: "bookflow-17d9f.firebasestorage.app",
  messagingSenderId: "1020382441634",
  appId: "1:1020382441634:web:40200c67e0f7e55038e7fb"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let currentBook = null;
let allBooks = [];

// AUTH
function signup(){
    auth.createUserWithEmailAndPassword(email.value, password.value)
    .catch(e => alert(e.message));
}

function signin(){
    auth.signInWithEmailAndPassword(email.value, password.value)
    .catch(e => alert(e.message));
}

function logout(){
    auth.signOut();
}

// STATE
auth.onAuthStateChanged(user=>{
    if(user){
        currentUser = user;
        login.style.display="none";
        app.style.display="flex";
        loadBooks();
    } else {
        login.style.display="block";
        app.style.display="none";
    }
});

// BOOKS
function addBook(){
    if(!bookInput.value) return;

    db.collection("users")
    .doc(currentUser.uid)
    .collection("books")
    .add({name: bookInput.value});

    bookInput.value="";
}

function deleteBook(id){
    db.collection("users")
    .doc(currentUser.uid)
    .collection("books")
    .doc(id)
    .delete();
}

function loadBooks(){
    db.collection("users")
    .doc(currentUser.uid)
    .collection("books")
    .onSnapshot(snap=>{
        allBooks=[];
        bookList.innerHTML="";
        snap.forEach(doc=>{
            const data = {id:doc.id, name:doc.data().name};
            allBooks.push(data);
        });
        renderBooks(allBooks);
    });
}

function renderBooks(books){
    bookList.innerHTML="";
    books.forEach(book=>{
        let div=document.createElement("div");
        div.className="book";

        div.innerHTML = `
            <span onclick="openBook('${book.id}','${book.name}')">📖 ${book.name}</span>
            <button class="delete" onclick="deleteBook('${book.id}')">❌</button>
        `;

        bookList.appendChild(div);
    });
}

function filterBooks(){
    const q = search.value.toLowerCase();
    const filtered = allBooks.filter(b=>b.name.toLowerCase().includes(q));
    renderBooks(filtered);
}

function openBook(id,name){
    currentBook=id;
    bookTitle.innerText=name;
    loadNotes();
}

// NOTES
function addNote(){
    if(!currentBook || !noteInput.value) return;

    db.collection("users")
    .doc(currentUser.uid)
    .collection("books")
    .doc(currentBook)
    .collection("notes")
    .add({text: noteInput.value});

    noteInput.value="";
}

function deleteNote(id){
    db.collection("users")
    .doc(currentUser.uid)
    .collection("books")
    .doc(currentBook)
    .collection("notes")
    .doc(id)
    .delete();
}

function loadNotes(){
    db.collection("users")
    .doc(currentUser.uid)
    .collection("books")
    .doc(currentBook)
    .collection("notes")
    .onSnapshot(snap=>{
        notes.innerHTML="";
        snap.forEach(doc=>{
            let div=document.createElement("div");
            div.className="note";

            div.innerHTML = `
                📌 ${doc.data().text}
                <button class="delete" onclick="deleteNote('${doc.id}')">❌</button>
            `;

            notes.appendChild(div);
        });
    });
}
</script>

</body>
</html>
