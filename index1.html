<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Книжковий чат-блог v2</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f4f4;
}

header {
    background: #111;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

#chat {
    height: 75vh;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.message {
    max-width: 75%;
    padding: 10px 15px;
    border-radius: 12px;
    line-height: 1.4;
    white-space: pre-wrap;
}

.user {
    align-self: flex-end;
    background: #d1e7ff;
}

.bot {
    align-self: flex-start;
    background: #e8e8e8;
}

#inputArea {
    display: flex;
    gap: 10px;
    padding: 10px;
    background: white;
    position: fixed;
    bottom: 0;
    width: 100%;
    box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
}

#textInput, #ratingInput {
    padding: 10px;
    font-size: 14px;
}

#textInput {
    flex: 1;
}

button {
    padding: 10px 15px;
    border: none;
    background: black;
    color: white;
    cursor: pointer;
}

.clear {
    background: #b00020;
}
</style>
</head>

<body>

<header>📚 Мій книжковий чат-блог v2</header>

<div id="chat"></div>

<div id="inputArea">
    <input id="textInput" placeholder="Назва книги..." />
    <input id="ratingInput" type="number" min="1" max="10" placeholder="⭐" style="width:60px;">
    <button onclick="sendMessage()">Додати</button>
    <button class="clear" onclick="clearChat()">Очистити</button>
</div>

<script>
let chat = document.getElementById("chat");

// завантаження з пам’яті
window.onload = function() {
    let saved = localStorage.getItem("books");
    if (saved) {
        chat.innerHTML = saved;
    }
};

function save() {
    localStorage.setItem("books", chat.innerHTML);
}

function sendMessage() {
    let text = document.getElementById("textInput").value.trim();
    let rating = document.getElementById("ratingInput").value;

    if (!text) return;

    let userMsg = document.createElement("div");
    userMsg.className = "message user";
    userMsg.innerText = "📖 " + text + (rating ? " ⭐" + rating + "/10" : "");
    chat.appendChild(userMsg);

    let botMsg = document.createElement("div");
    botMsg.className = "message bot";
    botMsg.innerText =
        "💬 Запис збережено\n" +
        "📌 Книга: " + text + "\n" +
        (rating ? "⭐ Оцінка: " + rating + "/10" : "⭐ Оцінка: не вказано");

    chat.appendChild(botMsg);

    document.getElementById("textInput").value = "";
    document.getElementById("ratingInput").value = "";

    chat.scrollTop = chat.scrollHeight;
    save();
}

function clearChat() {
    if (confirm("Очистити всі записи?")) {
        chat.innerHTML = "";
        localStorage.removeItem("books");
    }
}
</script>

</body>
</html>
